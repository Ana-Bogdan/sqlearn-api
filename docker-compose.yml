services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: sqlearn
      POSTGRES_USER: sqlearn
      POSTGRES_PASSWORD: sqlearn
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: sqlearn
      POSTGRES_USER: sqlearn
      POSTGRES_PASSWORD: sqlearn
    depends_on:
      - db

volumes:
  pgdata:
